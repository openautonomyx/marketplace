#
# Runs a SeaTunnel Zeta local batch job that reads from Salesforce, on microk8s.
# The connector jar (connector-salesforce-*.jar) must be present in the image's
# ${SEATUNNEL_HOME}/connectors directory — see deploy/microk8s/README.md.
---
apiVersion: v1
kind: Namespace
metadata:
  name: seatunnel
---
apiVersion: v1
kind: Secret
metadata:
  name: salesforce-credentials
  namespace: seatunnel
type: Opaque
stringData:
  # Replace these before applying. Prefer `kubectl create secret` or a sealed secret in real use.
  SALESFORCE_CLIENT_ID: "REPLACE_ME"
  SALESFORCE_CLIENT_SECRET: "REPLACE_ME"
  SALESFORCE_USERNAME: "REPLACE_ME"
  SALESFORCE_PASSWORD: "REPLACE_ME"
  SALESFORCE_SECURITY_TOKEN: "REPLACE_ME"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: salesforce-job-config
  namespace: seatunnel
data:
  salesforce_to_console.conf: |
    env {
      parallelism = 1
      job.mode = "BATCH"
    }
    source {
      Salesforce {
        url = "https://login.salesforce.com"
        client_id = "${SALESFORCE_CLIENT_ID}"
        client_secret = "${SALESFORCE_CLIENT_SECRET}"
        username = "${SALESFORCE_USERNAME}"
        password = "${SALESFORCE_PASSWORD}"
        security_token = "${SALESFORCE_SECURITY_TOKEN}"
        version = "59.0"
        query = "SELECT Id, Name, Industry, AnnualRevenue FROM Account"
        schema = {
          fields {
            Id = string
            Name = string
            Industry = string
            AnnualRevenue = double
          }
        }
      }
    }
    sink {
      Console {}
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: salesforce-ingest
  namespace: seatunnel
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: salesforce-ingest
    spec:
      restartPolicy: Never
      containers:
        - name: seatunnel
          image: apache/seatunnel:2.3.11
          command: ["/bin/sh", "-c"]
          args:
            - >
              ${SEATUNNEL_HOME}/bin/seatunnel.sh
              --config /opt/job/salesforce_to_console.conf
              -e local
          envFrom:
            - secretRef:
                name: salesforce-credentials
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
            - name: job-config
              mountPath: /opt/job
      volumes:
        - name: job-config
          configMap:
            name: salesforce-job-config
