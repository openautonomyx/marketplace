# Reads Account records from Salesforce via SOQL and prints them to the console.
env {
  parallelism = 1
  job.mode = "BATCH"
}

source {
  Salesforce {
    url = "https://login.salesforce.com"
    client_id = "<connected-app-consumer-key>"
    client_secret = "<connected-app-consumer-secret>"
    username = "<salesforce-username>"
    password = "<salesforce-password>"
    security_token = "<salesforce-security-token>"
    version = "59.0"
    query = "SELECT Id, Name, Industry, AnnualRevenue, NumberOfEmployees, IsActive, CreatedDate FROM Account"
    schema = {
      fields {
        Id = string
        Name = string
        Industry = string
        AnnualRevenue = double
        NumberOfEmployees = int
        IsActive = boolean
        CreatedDate = timestamp
      }
    }
  }
}

sink {
  Console {}
}
