# Generates synthetic Account rows with the FakeSource and writes them to Salesforce.
env {
  parallelism = 1
  job.mode = "BATCH"
}

source {
  FakeSource {
    row.num = 10
    schema = {
      fields {
        Name = string
        Industry = string
        AnnualRevenue = double
        NumberOfEmployees = int
      }
    }
  }
}

sink {
  Salesforce {
    url = "https://login.salesforce.com"
    client_id = "<connected-app-consumer-key>"
    client_secret = "<connected-app-consumer-secret>"
    username = "<salesforce-username>"
    password = "<salesforce-password>"
    security_token = "<salesforce-security-token>"
    version = "59.0"
    object = "Account"
    max_batch_size = 200
    all_or_none = false
  }
}
