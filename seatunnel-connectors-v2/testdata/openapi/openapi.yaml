components:
  schemas:
    Accounts:
      type: object
      required:
      - id
      - name
      - plan
      - country
      - created_at
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        plan:
          type: string
        country:
          type: string
        created_at:
          type: string
          format: date-time
    AdSpend:
      type: object
      required:
      - id
      - campaign_id
      - spend_date
      - impressions
      - clicks
      - spend
      properties:
        id:
          type: integer
          format: int64
        campaign_id:
          type: integer
          format: int64
        spend_date:
          type: string
          format: date
        impressions:
          type: integer
          format: int32
        clicks:
          type: integer
          format: int32
        spend:
          type: number
          format: double
    Branches:
      type: object
      required:
      - id
      - name
      - city
      - country
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        city:
          type: string
        country:
          type: string
    Campaigns:
      type: object
      required:
      - id
      - name
      - channel
      - start_date
      - end_date
      - budget
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        channel:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        budget:
          type: number
          format: double
    Customers:
      type: object
      required:
      - id
      - name
      - email
      - country
      - created_at
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
        country:
          type: string
        created_at:
          type: string
          format: date-time
    Devices:
      type: object
      required:
      - id
      - site_id
      - model
      - firmware
      - installed_at
      properties:
        id:
          type: integer
          format: int64
        site_id:
          type: integer
          format: int64
        model:
          type: string
        firmware:
          type: string
        installed_at:
          type: string
          format: date-time
    EmailEvents:
      type: object
      required:
      - id
      - campaign_id
      - lead_id
      - event_type
      - ts
      properties:
        id:
          type: integer
          format: int64
        campaign_id:
          type: integer
          format: int64
        lead_id:
          type: integer
          format: int64
        event_type:
          type: string
        ts:
          type: string
          format: date-time
    Encounters:
      type: object
