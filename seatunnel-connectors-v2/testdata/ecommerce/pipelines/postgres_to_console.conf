# Reads orders from the e-commerce Postgres model and prints them to the console.
# Uses SeaTunnel's built-in JDBC connector (bundled in the apache/seatunnel image).
# Load schema.sql + data/seed.sql into Postgres first.
env {
  parallelism = 1
  job.mode = "BATCH"
}

source {
  Jdbc {
    url = "jdbc:postgresql://postgres:5432/shop"
    driver = "org.postgresql.Driver"
    user = "postgres"
    password = "postgres"
    query = """
      SELECT o.id, o.status, o.total, c.name AS customer, c.country
      FROM orders o JOIN customers c ON c.id = o.customer_id
    """
  }
}

sink {
  Console {}
}
